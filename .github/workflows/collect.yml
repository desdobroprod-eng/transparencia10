name: Coleta de Dados

# Executa 2x/semana (segunda e quinta, 09:00 UTC = 06:00 São Luís) + disparo manual.
# Só atualiza CONTRATOS (PNCP federal funciona em runner do GitHub). O portal
# estadual do MA bloqueia IP fora do Brasil, então cruzamentos/emendas/execução
# do Estado falham rápido (disjuntor) e são PRESERVADOS — quem os atualiza é a
# coleta no Mac (IP Brasil). As guardas de regressão do run.py garantem que uma
# coleta parcial nunca zere o portal.
# Histórico: a cadência HORÁRIA antiga empilhava runs de 2-5h e derrubava o site.
on:
  schedule:
    - cron: "0 9 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

# Nunca empilhar coletas: uma nova cancela a anterior presa
concurrency:
  group: coleta
  cancel-in-progress: true

jobs:
  collect:
    name: Coletar dados do Portal da Transparência
    runs-on: ubuntu-latest
    # Mata execuções travadas (coletas saudáveis cabem em 2h30; presas de 5h+ não)
    timeout-minutes: 170

    steps:
      # 1. Checkout com histórico completo para permitir git push
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configurar Python 3.12
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: collector/requirements.txt

      # 3. Instalar dependências do coletor
      - name: Instalar dependências
        run: pip install -r collector/requirements.txt

      # 4. Executar o coletor de dados
      - name: Executar coletor
        run: python collector/run.py
        env:
          PORTAL_TRANSPARENCIA_API_KEY: ${{ secrets.PORTAL_TRANSPARENCIA_API_KEY }}

      # 4b. Gerar explicações em linguagem simples (template; usa IA local se houver)
      - name: Gerar explicações
        run: python collector/explicador.py

      # 5. Configurar identidade do bot para o commit
      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 6. Adicionar apenas os arquivos de dados gerados
      - name: Adicionar arquivos de dados ao stage
        run: git add frontend/public/data/

      # 7. Commitar somente se houver alterações (evita commits vazios)
      - name: Commitar dados atualizados
        run: |
          git diff --staged --quiet || git commit -m "data: atualização automática $(date -u '+%Y-%m-%d %H:%M UTC')"

      # 8. Enviar para o repositório remoto (rebase caso o remoto tenha avançado)
      - name: Push das alterações
        run: |
          git pull --rebase origin main
          git push
