name: Deploy para GitHub Pages

# Dispara no push de código/frontend OU após a coleta de dados ser concluída
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "frontend/public/data/**"
  workflow_run:
    workflows: ["Coleta de Dados"]
    types:
      - completed

# Permissões mínimas necessárias para deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez; cancela o pendente se um novo chegar
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build do frontend
    runs-on: ubuntu-latest
    # No caso de workflow_run, só executa se a coleta teve sucesso
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # 1. Checkout do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configurar Node.js 20
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # 3. Instalar dependências de forma determinística
      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      # 4. Gerar build estático do Next.js
      - name: Build da aplicação
        working-directory: frontend
        run: npm run build

      # 5. Publicar o artefato para o job de deploy
      - name: Publicar artefato do GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy no GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
